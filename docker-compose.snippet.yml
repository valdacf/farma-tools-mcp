# Drop into your existing docker-compose.yml under `services:`.
# Reads MCP_BEARER_TOKEN (and optional OAUTH_CLIENT_ID/SECRET) from the parent .env file.

services:
  farma-tools-mcp:
    build: ./farma-tools-mcp
    container_name: farma-tools-mcp
    restart: unless-stopped
    ports:
      - "14000:14000"
    environment:
      - MCP_BEARER_TOKEN=${MCP_BEARER_TOKEN}
      - MCP_TRANSPORT=streamable-http
      # Optional: enable OAuth shim for Claude.ai cowork (needs both vars).
      # - OAUTH_CLIENT_ID=${OAUTH_CLIENT_ID}
      # - OAUTH_CLIENT_SECRET=${OAUTH_CLIENT_SECRET}
      - PYTHONUNBUFFERED=1
    networks:
      - ai-net

# Make sure this network exists in your compose file:
# networks:
#   ai-net:
#     external: true   # or driver: bridge
